name: CheckoV-Integration

on:
  pull_request:
    branches:
      -main
  push:
    branches:
      -main
permissions:
  id-token: write
  contents: read
  
jobs:
  Security-Tool-CheckoV:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CheckOv
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: 

      - name: Terraform Install
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform plan
        run: terrafrom plan -out=tfplan

  Resource-Provision:
    runs-on: ubuntu-latest
    needs: Security-Tool-CheckoV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Install
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init   

      - name: Terraform apply
        run: terraform apply -auto-approve
