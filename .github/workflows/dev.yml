name: CheckoV-Integration

on:
  push:
    branches:
      -main

permissions:
  id-token: write
  contents: read
  
jobs:
  Security-Tool-CheckoV:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CheckOv
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: ./azure_resources

      - name: Terraform Install
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./azure_resources

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./azure_resources

      - name: Terraform fmt
        run: terraform fmt -recursive
        working-directory: ./azure_resources

      - name: Terraform plan
        run: terrafrom plan -out=tfplan
        working-directory: ./azure_resources

  Resource-Provision:
    runs-on: ubuntu-latest
    environment: production
    needs: Security-Tool-CheckoV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Install
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init   
        working-directory: ./azure_resources

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: ./azure_resources
